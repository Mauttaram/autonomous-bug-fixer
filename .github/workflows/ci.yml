name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── test-webapp unit tests ────────────────────────────────────────────────
  test-webapp:
    name: test-webapp unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: test-webapp

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: test-webapp/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: pytest tests/ -v --tb=short

  # ── api-service unit tests ────────────────────────────────────────────────
  api-service:
    name: api-service unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api-service

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: api-service/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: pytest tests/ -v --tb=short

  # ── integration tests (Docker Compose) ───────────────────────────────────
  integration:
    name: integration tests
    runs-on: ubuntu-latest
    needs: [test-webapp, api-service]

    steps:
      - uses: actions/checkout@v4

      - name: Start multi-repo sandbox
        run: |
          docker compose -f docker-compose.multi-repo.yml --profile sandbox up -d --build
          # Give services time to become healthy
          sleep 10

      - name: Run integration tests
        run: |
          docker compose -f docker-compose.multi-repo.yml --profile integration \
            run --rm integration-test

      - name: Stop services
        if: always()
        run: docker compose -f docker-compose.multi-repo.yml down

  # ── RAG feedback loop smoke test ─────────────────────────────────────────
  rag-smoke:
    name: RAG feedback loop smoke test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Seed RAG store
        run: python demo/seed_failures.py

      - name: Dry-run demo (BUG-001)
        run: python demo/run_demo.py

      - name: Dry-run demo (BUG-002)
        run: python demo/run_demo.py --bug BUG-002

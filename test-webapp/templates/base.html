<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}TechStore{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
  <nav class="navbar navbar-dark bg-dark px-4">
    <a class="navbar-brand fw-bold" href="/"><i class="bi bi-cpu me-2"></i>TechStore</a>
    <span class="navbar-text text-warning">
      <i class="bi bi-bug me-1"></i> Demo App — Safe Agentic Deploy Hackathon
    </span>
  </nav>

  <div class="container py-4">
    {% block content %}{% endblock %}
  </div>

  <footer class="text-center text-muted py-3 mt-4 border-top small">
    TechStore Demo &mdash; OSS4AI Hackathon &mdash; Safe Agentic Deploy
  </footer>
</body>
</html>
